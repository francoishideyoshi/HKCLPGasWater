name: Update utility data

# Runs daily and on manual dispatch. Scrapes (where possible), merges with
# manual_data.json, and commits public/data.json back if it changed.
on:
  schedule:
    # 02:00 UTC = 10:00 HKT, daily. GitHub cron can run late; that's fine since
    # utility consumption only updates per billing cycle.
    - cron: "0 2 * * *"
  workflow_dispatch: {}

# Allow the workflow to commit back to the repo using the built-in token.
permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install --with-deps chromium

      - name: Run scrapers and build data.json
        env:
          # Credentials come from repo Secrets. Missing secrets simply mean that
          # provider is skipped (manual fallback) -- the run still succeeds.
          CLP_USERNAME: ${{ secrets.CLP_USERNAME }}
          CLP_PASSWORD: ${{ secrets.CLP_PASSWORD }}
          CLP_PROVIDER_MODE: ${{ vars.CLP_PROVIDER_MODE }}
          TOWNGAS_USERNAME: ${{ secrets.TOWNGAS_USERNAME }}
          TOWNGAS_PASSWORD: ${{ secrets.TOWNGAS_PASSWORD }}
          TOWNGAS_PROVIDER_MODE: ${{ vars.TOWNGAS_PROVIDER_MODE }}
          WSD_USERNAME: ${{ secrets.WSD_USERNAME }}
          WSD_PASSWORD: ${{ secrets.WSD_PASSWORD }}
          WSD_PROVIDER_MODE: ${{ vars.WSD_PROVIDER_MODE }}
        run: python -m scrapers.run_all

      - name: Commit updated data.json if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data.json
          git diff --quiet --cached || git commit -m "chore: update utility data [skip ci]"
          git push
